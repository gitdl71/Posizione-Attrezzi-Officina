<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Officina</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#FFFFFF;--border:#E0DED8;--border-strong:#C8C6BF;--text:#1A1916;--text-muted:#6B6960;--accent:#1A1916;--accent-fg:#F5F4F0;--tag-bg:#ECEAE4;--tag-text:#3A3830;--code-bg:#ECEAE4;--red:#C0392B;--radius:6px;--radius-lg:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 0;display:flex;align-items:baseline;justify-content:space-between}
.header-title{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;letter-spacing:-0.02em}
.header-sub{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace}
.nav{display:flex;padding:16px 20px 0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 12px;border:none;background:none;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s;flex-shrink:0}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text)}
.content{padding:20px;flex:1}
.section{display:none}.section.active{display:block}
.search-wrap{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--text)}.search-input::placeholder{color:var(--text-muted)}
.btn{padding:11px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text);white-space:nowrap;transition:background .12s}
.btn:active{background:var(--tag-bg)}.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}.btn-primary:active{background:#333}
.btn-sm{padding:6px 10px;font-size:12px}.btn-ghost{border-color:transparent;background:transparent}.btn-danger{color:var(--red);border-color:transparent;background:transparent}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px}
.result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.result-name{font-size:15px;font-weight:500;line-height:1.3;cursor:pointer;text-decoration:none;color:var(--text)}
.result-name:hover{text-decoration:underline}
.result-actions{display:flex;gap:4px;flex-shrink:0}
.pos-badge{display:inline-flex;align-items:center;gap:5px;background:var(--code-bg);border-radius:4px;padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tag-text);margin-bottom:8px}
.pos-desc{font-size:11px;color:var(--text-muted);margin-left:4px;font-family:'IBM Plex Sans',sans-serif}
.tags-row{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:500}
.empty{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:12px}
.status-bar{font-size:12px;color:var(--text-muted);margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
.form-section{margin-bottom:20px}
.form-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:5px;font-weight:500}
.form-input,.form-select{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--surface);color:var(--text);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pos-group{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface);transition:border-color .12s,background .12s;user-select:none}
.checkbox-item.checked{border-color:var(--text);background:var(--text);color:var(--accent-fg)}
.checkbox-item input{display:none}
.checkbox-label{font-size:13px;font-weight:500}
.form-actions{display:flex;gap:10px;margin-top:24px;padding-bottom:40px}
.form-actions .btn{flex:1;padding:13px;font-size:14px}
.dash-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:20px 0 10px;font-family:'IBM Plex Mono',monospace}
.dash-section-title:first-child{margin-top:0}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;text-align:center}
.stat-value{font-size:26px;font-weight:500;font-family:'IBM Plex Mono',monospace;line-height:1.1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.bar-label:hover{text-decoration:underline}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s ease}
.bar-count{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;min-width:24px;text-align:right}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:16px}
.cat-pill{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);font-size:13px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .12s,background .12s}
.cat-pill:active{background:var(--tag-bg)}
.cat-pill-count{font-size:11px;font-family:'IBM Plex Mono',monospace;opacity:.6}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:14px;padding:4px 0}

/* DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,25,22,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.overlay-card{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px 20px 40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.overlay-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 20px}
.overlay-name{font-size:20px;font-weight:500;margin-bottom:16px;line-height:1.3}
.overlay-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.overlay-key{font-size:12px;color:var(--text-muted);font-weight:500;min-width:90px;padding-top:2px}
.overlay-val{font-size:14px;color:var(--text);flex:1}
.overlay-actions{display:flex;gap:8px;margin-top:20px}
.overlay-actions .btn{flex:1}

/* IMPOSTAZIONI */
.settings-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.settings-block-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.zone-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.zone-row:last-child{border-bottom:none}
.zone-name{flex:1;font-size:14px;font-weight:500}
.zone-count{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;margin-right:8px}
.pos-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.pos-row:last-child{border-bottom:none}
.pos-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;background:var(--code-bg);padding:2px 7px;border-radius:4px;min-width:52px;text-align:center}
.pos-label-text{flex:1;font-size:13px}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row .form-input{flex:1;padding:8px 10px;font-size:13px}
.inline-input{padding:6px 10px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;background:var(--surface);color:var(--text);outline:none}
.inline-input:focus{border-color:var(--text)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;transition:transform .25s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.checkbox-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}.pos-group{grid-template-columns:1fr}.bar-label{min-width:90px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">officina</div>
    <div class="header-sub" id="item-count">—</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('cerca')">Cerca</button>
    <button class="nav-btn" onclick="switchTab('sfoglia')">Sfoglia</button>
    <button class="nav-btn" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="switchTab('aggiungi')">Aggiungi</button>
    <button class="nav-btn" onclick="switchTab('impostazioni')">Impostazioni</button>
  </div>
  <div class="content">

    <!-- CERCA -->
    <div id="sec-cerca" class="section active">
      <div class="search-wrap">
        <input type="search" class="search-input" id="search-input" placeholder="nome, codice, categoria..." oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn" onclick="doSearch()">Cerca</button>
      </div>
      <div id="search-status" class="status-bar"></div>
      <div id="results-list"><div class="empty"><div class="empty-icon">🔍</div>Scrivi qualcosa per cercare</div></div>
    </div>

    <!-- SFOGLIA -->
    <div id="sec-sfoglia" class="section">
      <div id="sfoglia-cats">
        <div class="status-bar" id="sfoglia-status"></div>
        <div class="cat-grid" id="cat-pills"></div>
      </div>
      <div id="sfoglia-results" style="display:none">
        <div class="back-btn" onclick="showCatList()">← tutte le categorie</div>
        <div class="status-bar" id="sfoglia-result-status"></div>
        <div id="sfoglia-items-list"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section">
      <div id="dashboard-content"><div class="empty">Caricamento...</div></div>
    </div>

    <!-- AGGIUNGI -->
    <div id="sec-aggiungi" class="section">
      <div id="edit-banner" style="display:none;background:#FAEEDA;border:1px solid #FAC775;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#633806;justify-content:space-between;align-items:center;">
        <span>Modalità modifica</span>
        <button class="btn btn-sm" onclick="resetForm()">Annulla</button>
      </div>
      <div class="form-section">
        <div class="form-section-title">Oggetto</div>
        <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="f-nome" placeholder="es. Chiave inglese 32mm" autocomplete="off"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Quantità</label><input class="form-input" id="f-qty" type="number" min="0" value="1"></div>
          <div class="form-group"><label class="form-label">Unità</label>
            <select class="form-select" id="f-unita">
              <option value="pz">pz</option><option value="m">m</option><option value="cm">cm</option>
              <option value="kg">kg</option><option value="g">g</option><option value="l">l</option>
              <option value="ml">ml</option><option value="fogli">fogli</option><option value="rotoli">rotoli</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Dimensioni (facoltativo)</label><input class="form-input" id="f-dim" placeholder="es. 32mm, 1m x 2m, M8"></div>
        <div class="form-group"><label class="form-label">Note (facoltativo)</label><input class="form-input" id="f-note" placeholder="marca, modello, stato..."></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">Posizione</div>
        <div class="pos-group">
          <div class="form-group"><label class="form-label">Zona</label>
            <select class="form-select" id="f-zona" onchange="updateContenitore()"></select>
          </div>
          <div class="form-group"><label class="form-label">Posizione</label>
            <select class="form-select" id="f-pos"><option value="">— prima la zona —</option></select>
          </div>
        </div>
      </div>
      <div class="form-section">
        <div class="form-section-title">Categorie</div>
        <div class="checkbox-grid" id="cat-grid"></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="resetForm()">Pulisci</button>
        <button class="btn btn-primary" onclick="saveItem()">Salva</button>
      </div>
    </div>

    <!-- IMPOSTAZIONI -->
    <div id="sec-impostazioni" class="section">
      <div id="settings-content"></div>
    </div>

  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="overlay-card" id="detail-card">
    <div class="overlay-handle"></div>
    <div class="overlay-name" id="d-nome"></div>
    <div id="d-rows"></div>
    <div class="overlay-actions">
      <button class="btn" onclick="closeDetailDirect()">Chiudi</button>
      <button class="btn" id="d-edit-btn">✏️ Modifica</button>
      <button class="btn btn-danger" id="d-del-btn">Elimina</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxbo-mBXrzLPzvwq66Kyixu9TAVl-TALke6g6roIAxJZbGhd3VulqZHryzdfclguFsc/exec';

const DEFAULT_POSITIONS={
  'Pareti':[{code:'LP',label:'LP — Parete Lato Pisa'},{code:'LM',label:'LM — Parete Lato Mare'},{code:'LL',label:'LL — Parete Lato Lago'},{code:'LV',label:'LV — Parete Lato Viareggio'}],
  'Porte':[{code:'P1',label:'P1 — Porta LP (fissa)'},{code:'P2',label:'P2 — Porta LP (apertura)'},{code:'P3',label:'P3 — Porta LP (mezzo)'},{code:'P4',label:'P4 — Porta LM'}],
  'French Cleat & Pannelli':[{code:'FC1',label:'FC1 — French Cleat 1 (LM-LP)'},{code:'FC2',label:'FC2 — French Cleat 2 (LM-LV)'},{code:'MLM',label:'MLM — Mensola LM'},{code:'PLM',label:'PLM — Pannello LM (Pegboard)'}],
  'Cassetti':[{code:'C1',label:'C1 — Cassetto 1'},{code:'C2',label:'C2 — Cassetto 2'},{code:'C3',label:'C3 — Cassetto 3'},{code:'C4',label:'C4 — Cassetto 4'}],
  'Banchi':[{code:'BLP',label:'BLP — Banco LP'},{code:'BLV',label:'BLV — Banco LV'}],
  'Rack & Ripiani':[{code:'RLV',label:'RLV — Rack LV'},{code:'RLL1',label:'RLL1 — Rack LL1 (primo da sx)'},{code:'RLL2',label:'RLL2 — Rack LL2 (secondo da sx)'},{code:'RLL3',label:'RLL3 — Rack LL3 (terzo da sx)'},{code:'RLV.1',label:'RLV.1 — Piano Rack 1 (alto)'},{code:'RLV.2',label:'RLV.2 — Piano Rack 2 (mezzano)'},{code:'RLV.3',label:'RLV.3 — Piano Rack 3 (mezzano)'},{code:'RLV.4',label:'RLV.4 — Piano Rack 4 (basso)'}],
  'Box & Contenitori':[{code:'B1',label:'B1 — Box supporti'},{code:'B2',label:'B2 — Box Dremel'},{code:'V1',label:'V1 — Box Elettricità 1'},{code:'V2',label:'V2 — Box Elettricità 2'},{code:'V3',label:'V3 — Box Elettricità 3'},{code:'RB',label:'RB — Rack Bombolette'},{code:'W1',label:'W1 — Box Wrangler 1'},{code:'W2',label:'W2 — Box Wrangler 2'},{code:'W3',label:'W3 — Box Wrangler 3'},{code:'G1',label:'G1 — Piccolo grigio'},{code:'D1',label:'D1 — Box Liquidi restauro'},{code:'D2',label:'D2 — Box Accessori'},{code:'D3',label:'D3 — Box Accessori 2'}]
};

const CATEGORIES=['Viteria','Bulloneria','Restauro','Saldatura','Elettricità','Elettronica','Ferro','Idraulica','Laboratorio','Motori','Verniciatura','Woodworking','Attrezzi','Wrangler','Progetti da fare','Aria compressa','Varie','Carpenteria','Muratura'];

let selectedCats=new Set(), editId=null, cachedItems=[], currentDetailId=null;
let POSITIONS={};

function loadPositions(){
  try{
    const raw=localStorage.getItem('officina_positions');
    POSITIONS=raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEFAULT_POSITIONS));
  }catch(e){POSITIONS=JSON.parse(JSON.stringify(DEFAULT_POSITIONS));}
}
function savePositions(){localStorage.setItem('officina_positions',JSON.stringify(POSITIONS));}

function init(){
  loadPositions();
  buildCatGrid();
  buildZoneSelect();
  loadCache();
  refreshFromServer();
}

function loadCache(){try{const r=localStorage.getItem('officina_cache');if(r)cachedItems=JSON.parse(r);}catch(e){cachedItems=[];}updateItemCount();}
function saveCache(){localStorage.setItem('officina_cache',JSON.stringify(cachedItems));updateItemCount();}
async function refreshFromServer(){try{const r=await fetch(SCRIPT_URL);const d=await r.json();if(d.items){cachedItems=d.items;saveCache();}}catch(e){}}
function updateItemCount(){document.getElementById('item-count').textContent=cachedItems.length?cachedItems.length+' oggetti':'—';}

function switchTab(t){
  const tabs=['cerca','sfoglia','dashboard','aggiungi','impostazioni'];
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='dashboard')renderDashboard();
  if(t==='sfoglia')renderCatPills();
  if(t==='impostazioni')renderSettings();
}

/* ---- CERCA ---- */
function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const list=document.getElementById('results-list');
  const status=document.getElementById('search-status');
  if(!q){list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Scrivi qualcosa per cercare</div>';status.textContent='';return;}
  const res=cachedItems.filter(i=>(i.nome||'').toLowerCase().includes(q)||(i.categorie||'').toLowerCase().includes(q)||(i.posizione||'').toLowerCase().includes(q)||(i.pos_codice||'').toLowerCase().includes(q)||(i.note||'').toLowerCase().includes(q)||(i.dimensioni||'').toLowerCase().includes(q));
  status.textContent=res.length?res.length+' risultat'+(res.length===1?'o':'i')+' per "'+q+'"':'';
  list.innerHTML=res.length?res.map(itemCard).join(''):'<div class="empty"><div class="empty-icon">📭</div>Nessun risultato per "<strong>'+q+'</strong>"</div>';
}

/* ---- SFOGLIA ---- */
function renderCatPills(){
  const counts={};
  CATEGORIES.forEach(c=>counts[c]=0);
  cachedItems.forEach(item=>{if(!item.categorie)return;item.categorie.split(',').forEach(c=>{const t=c.trim();if(counts[t]!==undefined)counts[t]++;});});
  const used=CATEGORIES.filter(c=>counts[c]>0);
  document.getElementById('sfoglia-status').textContent=used.length?used.length+' categorie usate':'Nessun oggetto ancora inserito';
  document.getElementById('cat-pills').innerHTML=CATEGORIES.map(c=>'<div class="cat-pill" style="'+(counts[c]===0?'opacity:.4':'')+'\" onclick="showCatItems(\''+c+'\')"><span>'+c+'</span><span class="cat-pill-count">'+counts[c]+'</span></div>').join('');
  document.getElementById('sfoglia-cats').style.display='block';
  document.getElementById('sfoglia-results').style.display='none';
}
function showCatItems(cat){
  const items=cachedItems.filter(i=>i.categorie&&i.categorie.split(',').map(c=>c.trim()).includes(cat));
  document.getElementById('sfoglia-cats').style.display='none';
  document.getElementById('sfoglia-results').style.display='block';
  document.getElementById('sfoglia-result-status').textContent=cat+' — '+items.length+' oggett'+(items.length===1?'o':'i');
  document.getElementById('sfoglia-items-list').innerHTML=items.length?items.map(itemCard).join(''):'<div class="empty">Nessun oggetto in questa categoria</div>';
}
function showCatList(){document.getElementById('sfoglia-cats').style.display='block';document.getElementById('sfoglia-results').style.display='none';}

/* ---- DASHBOARD ---- */
function renderDashboard(){
  const el=document.getElementById('dashboard-content');
  if(!cachedItems.length){el.innerHTML='<div class="empty">Nessun dato ancora inserito</div>';return;}
  const total=cachedItems.length;
  const zone={},catCount={},posCount={};
  cachedItems.forEach(item=>{
    const z=item.zona||'Non specificata';zone[z]=(zone[z]||0)+1;
    if(item.categorie)item.categorie.split(',').forEach(c=>{const t=c.trim();if(t)catCount[t]=(catCount[t]||0)+1;});
    const p=item.pos_codice||item.posizione||'—';posCount[p]=(posCount[p]||0)+1;
  });
  const topCats=Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topPos=Object.entries(posCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCat=topCats[0]?.[1]||1,maxPos=topPos[0]?.[1]||1;
  const zoneEntries=Object.entries(zone).sort((a,b)=>b[1]-a[1]).slice(0,3);
  el.innerHTML=
    '<div class="dash-section-title">Totale</div>'+
    '<div class="stat-grid">'+
    '<div class="stat-card" style="grid-column:1/-1;text-align:left;display:flex;align-items:baseline;gap:12px"><div class="stat-value">'+total+'</div><div class="stat-label">oggetti in inventario</div></div>'+
    zoneEntries.map(([z,n])=>'<div class="stat-card"><div class="stat-value">'+n+'</div><div class="stat-label">'+z+'</div></div>').join('')+
    '</div>'+
    '<div class="dash-section-title">Per categoria</div>'+
    topCats.map(([c,n])=>'<div class="bar-row"><div class="bar-label" onclick="goToCat(\''+c+'\')" title="Vedi tutti">'+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxCat*100)+'%"></div></div><div class="bar-count">'+n+'</div></div>').join('')+
    '<div class="dash-section-title">Per posizione</div>'+
    topPos.map(([p,n])=>'<div class="bar-row"><div class="bar-label" onclick="searchPos(\''+p+'\')" title="Cerca">'+p+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxPos*100)+'%"></div></div><div class="bar-count">'+n+'</div></div>').join('')+
    '<div style="padding-bottom:40px"></div>';
}
function goToCat(cat){switchTab('sfoglia');showCatItems(cat);}
function searchPos(pos){switchTab('cerca');document.getElementById('search-input').value=pos;doSearch();}

/* ---- DETAIL OVERLAY ---- */
function openDetail(id){
  const item=cachedItems.find(i=>i.id===id);if(!item)return;
  currentDetailId=id;
  document.getElementById('d-nome').textContent=item.nome;
  const rows=[];
  if(item.pos_codice||item.posizione)rows.push(['Posizione','<span style="font-family:\'IBM Plex Mono\',monospace;font-size:13px;background:var(--code-bg);padding:2px 7px;border-radius:4px">'+(item.pos_codice||'')+'</span> '+(item.posizione||'')]);
  if(item.zona)rows.push(['Zona',item.zona]);
  if(item.qty)rows.push(['Quantità',item.qty+' '+(item.unita||'pz')]);
  if(item.dimensioni)rows.push(['Dimensioni',item.dimensioni]);
  if(item.categorie)rows.push(['Categorie','<div class="tags-row" style="margin-top:2px">'+item.categorie.split(',').map(c=>'<span class="tag">'+c.trim()+'</span>').join('')+'</div>']);
  if(item.note)rows.push(['Note',item.note]);
  if(item.data)rows.push(['Inserito',item.data]);
  document.getElementById('d-rows').innerHTML=rows.map(([k,v])=>'<div class="overlay-row"><div class="overlay-key">'+k+'</div><div class="overlay-val">'+v+'</div></div>').join('');
  document.getElementById('d-edit-btn').onclick=()=>{closeDetailDirect();editItem(id);};
  document.getElementById('d-del-btn').onclick=()=>{closeDetailDirect();deleteItem(id);};
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailDirect();}
function closeDetailDirect(){document.getElementById('detail-overlay').classList.remove('open');}

/* ---- ITEM CARD ---- */
function itemCard(item){
  const cats=item.categorie?item.categorie.split(',').map(c=>'<span class="tag">'+c.trim()+'</span>').join(''):'';
  const qty=item.qty?item.qty+' '+(item.unita||'pz'):'';
  const dim=item.dimensioni?' · '+item.dimensioni:'';
  return '<div class="result-card">'+
    '<div class="result-top">'+
    '<div class="result-name" onclick="openDetail(\''+item.id+'\')">'+item.nome+'</div>'+
    '<div class="result-actions">'+
    '<button class="btn btn-sm btn-ghost" onclick="editItem(\''+item.id+'\')" title="Modifica">✏️</button>'+
    '<button class="btn btn-sm btn-danger" onclick="deleteItem(\''+item.id+'\')" title="Elimina">✕</button>'+
    '</div></div>'+
    (item.pos_codice?'<div class="pos-badge"><strong>'+item.pos_codice+'</strong><span class="pos-desc">'+(item.posizione||'')+'</span></div>':'')+
    (qty?'<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">'+qty+dim+'</div>':'')+
    (cats?'<div class="tags-row">'+cats+'</div>':'')+
    (item.note?'<div style="font-size:12px;color:var(--text-muted);margin-top:6px">'+item.note+'</div>':'')+
    '</div>';
}

/* ---- SAVE / EDIT / DELETE ---- */
async function saveItem(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Inserisci il nome');return;}
  const posCode=document.getElementById('f-pos').value;
  const zona=document.getElementById('f-zona').value;
  const posEntry=(POSITIONS[zona]||[]).find(p=>p.code===posCode);
  const posLabel=posEntry?posEntry.label.split('—').slice(1).join('—').trim():posCode;
  const item={id:editId||Date.now().toString(),nome,qty:document.getElementById('f-qty').value||'1',unita:document.getElementById('f-unita').value,dimensioni:document.getElementById('f-dim').value.trim(),zona,posizione:posLabel,pos_codice:posCode,categorie:[...selectedCats].join(', '),note:document.getElementById('f-note').value.trim(),data:new Date().toLocaleDateString('it-IT'),action:editId?'update':'add'};
  toast('Salvataggio...');
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(item)});}catch(e){}
  const idx=cachedItems.findIndex(i=>i.id===item.id);
  if(idx>=0)cachedItems[idx]=item;else cachedItems.push(item);
  saveCache();toast(editId?'Modificato!':'Salvato!');resetForm();
}
async function deleteItem(id){
  if(!confirm('Eliminare questo elemento?'))return;
  cachedItems=cachedItems.filter(i=>i.id!==id);saveCache();
  doSearch();toast('Eliminato');
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});}catch(e){}
}
function editItem(id){
  const item=cachedItems.find(i=>i.id===id);if(!item)return;
  editId=id;switchTab('aggiungi');
  document.getElementById('f-nome').value=item.nome||'';
  document.getElementById('f-qty').value=item.qty||1;
  document.getElementById('f-unita').value=item.unita||'pz';
  document.getElementById('f-dim').value=item.dimensioni||'';
  document.getElementById('f-note').value=item.note||'';
  buildZoneSelect();
  if(item.zona){document.getElementById('f-zona').value=item.zona;updateContenitore();if(item.pos_codice)document.getElementById('f-pos').value=item.pos_codice;}
  selectedCats=new Set(item.categorie?item.categorie.split(',').map(c=>c.trim()).filter(Boolean):[]);
  document.querySelectorAll('.checkbox-item').forEach(el=>el.classList.toggle('checked',selectedCats.has(el.querySelector('.checkbox-label').textContent)));
  document.getElementById('edit-banner').style.display='flex';
}
function resetForm(){
  editId=null;
  document.getElementById('f-nome').value='';document.getElementById('f-qty').value=1;
  document.getElementById('f-unita').value='pz';document.getElementById('f-dim').value='';document.getElementById('f-note').value='';
  buildZoneSelect();document.getElementById('f-pos').innerHTML='<option value="">— prima la zona —</option>';
  selectedCats.clear();document.querySelectorAll('.checkbox-item').forEach(el=>el.classList.remove('checked'));
  document.getElementById('edit-banner').style.display='none';
}

/* ---- FORM HELPERS ---- */
function buildCatGrid(){document.getElementById('cat-grid').innerHTML=CATEGORIES.map(c=>'<div class="checkbox-item" onclick="toggleCat(\''+c+'\')"><input type="checkbox"><span class="checkbox-label">'+c+'</span></div>').join('');}
function toggleCat(c){if(selectedCats.has(c))selectedCats.delete(c);else selectedCats.add(c);document.querySelectorAll('.checkbox-item').forEach(el=>el.classList.toggle('checked',selectedCats.has(el.querySelector('.checkbox-label').textContent)));}
function buildZoneSelect(){
  const sel=document.getElementById('f-zona');
  const cur=sel.value;
  sel.innerHTML='<option value="">— seleziona —</option>'+Object.keys(POSITIONS).map(z=>'<option value="'+z+'">'+z+'</option>').join('');
  if(cur)sel.value=cur;
}
function updateContenitore(){
  const zona=document.getElementById('f-zona').value;
  const sel=document.getElementById('f-pos');
  if(!zona||!POSITIONS[zona]){sel.innerHTML='<option value="">— prima la zona —</option>';return;}
  sel.innerHTML='<option value="">— seleziona —</option>'+(POSITIONS[zona]||[]).map(p=>'<option value="'+p.code+'">'+p.label+'</option>').join('');
}

/* ---- IMPOSTAZIONI ---- */
function renderSettings(){
  const el=document.getElementById('settings-content');
  const zones=Object.keys(POSITIONS);
  el.innerHTML='<div class="settings-block">'+
    '<div class="settings-block-title"><span>Zone e posizioni</span></div>'+
    '<div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Clicca su una zona per gestire le sue posizioni. Le modifiche si salvano automaticamente.</div>'+
    zones.map((z,zi)=>{
      const pcount=POSITIONS[z].length;
      return '<div class="zone-row">'+
        '<div class="zone-name">'+z+'</div>'+
        '<div class="zone-count">'+pcount+' pos.</div>'+
        '<button class="btn btn-sm" onclick="toggleZoneDetail('+zi+')">Gestisci</button>'+
        '<button class="btn btn-sm btn-danger" onclick="deleteZone(\''+z+'\')">✕</button>'+
        '</div>'+
        '<div id="zone-detail-'+zi+'" style="display:none;padding:10px 0 6px;border-bottom:1px solid var(--border)">'+
        POSITIONS[z].map((p,pi)=>'<div class="pos-row">'+
          '<span class="pos-code">'+p.code+'</span>'+
          '<span class="pos-label-text">'+p.label.split('—').slice(1).join('—').trim()+'</span>'+
          '<button class="btn btn-sm btn-danger" onclick="deletePos(\''+z+'\','+pi+')">✕</button>'+
          '</div>').join('')+
        '<div class="add-row">'+
        '<input class="form-input" id="new-code-'+zi+'" placeholder="Codice" style="max-width:90px">'+
        '<input class="form-input" id="new-label-'+zi+'" placeholder="Descrizione">'+
        '<button class="btn btn-sm btn-primary" onclick="addPos(\''+z+'\','+zi+')">+</button>'+
        '</div></div>';
    }).join('')+
    '<div class="add-row" style="margin-top:14px">'+
    '<input class="form-input" id="new-zone-name" placeholder="Nome nuova zona">'+
    '<button class="btn btn-sm btn-primary" onclick="addZone()">+ Zona</button>'+
    '</div>'+
    '</div>'+
    '<div class="settings-block">'+
    '<div class="settings-block-title">Ripristina predefiniti</div>'+
    '<div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">Riporta zone e posizioni ai valori originali. Gli oggetti inseriti non vengono modificati.</div>'+
    '<button class="btn btn-danger" onclick="resetPositions()">Ripristina predefiniti</button>'+
    '</div>'+
    '<div style="padding-bottom:40px"></div>';
}

function toggleZoneDetail(zi){
  const el=document.getElementById('zone-detail-'+zi);
  el.style.display=el.style.display==='none'?'block':'none';
}
function addZone(){
  const name=document.getElementById('new-zone-name').value.trim();
  if(!name){toast('Inserisci il nome della zona');return;}
  if(POSITIONS[name]){toast('Zona già esistente');return;}
  POSITIONS[name]=[];savePositions();buildZoneSelect();renderSettings();toast('Zona aggiunta');
}
function deleteZone(z){
  if(!confirm('Eliminare la zona "'+z+'" e tutte le sue posizioni?'))return;
  delete POSITIONS[z];savePositions();buildZoneSelect();renderSettings();toast('Zona eliminata');
}
function addPos(zona,zi){
  const code=document.getElementById('new-code-'+zi).value.trim().toUpperCase();
  const label=document.getElementById('new-label-'+zi).value.trim();
  if(!code||!label){toast('Inserisci codice e descrizione');return;}
  POSITIONS[zona].push({code,label:code+' — '+label});
  savePositions();buildZoneSelect();renderSettings();toast('Posizione aggiunta');
}
function deletePos(zona,pi){
  POSITIONS[zona].splice(pi,1);savePositions();buildZoneSelect();renderSettings();toast('Posizione eliminata');
}
function resetPositions(){
  if(!confirm('Ripristinare le posizioni predefinite?'))return;
  POSITIONS=JSON.parse(JSON.stringify(DEFAULT_POSITIONS));
  savePositions();buildZoneSelect();renderSettings();toast('Posizioni ripristinate');
}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}

init();
</script>
</body>
</html>
