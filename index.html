<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Officina</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#FFFFFF;--border:#E0DED8;--border-strong:#C8C6BF;--text:#1A1916;--text-muted:#6B6960;--accent:#1A1916;--accent-fg:#F5F4F0;--tag-bg:#ECEAE4;--tag-text:#3A3830;--code-bg:#ECEAE4;--red:#C0392B;--radius:6px;--radius-lg:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 20px 0;display:flex;align-items:baseline;justify-content:space-between}
.header-title{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;letter-spacing:-0.02em}
.header-sub{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace}
.nav{display:flex;padding:16px 20px 0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 12px;border:none;background:none;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s;flex-shrink:0}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text)}
.content{padding:20px;flex:1}
.section{display:none}.section.active{display:block}

.search-wrap{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--text)}.search-input::placeholder{color:var(--text-muted)}
.btn{padding:11px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text);white-space:nowrap;transition:background .12s}
.btn:active{background:var(--tag-bg)}.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}.btn-primary:active{background:#333}
.btn-sm{padding:6px 10px;font-size:12px}.btn-ghost{border-color:transparent;background:transparent}.btn-danger{color:var(--red);border-color:transparent;background:transparent}

.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px}
.result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.result-name{font-size:15px;font-weight:500;line-height:1.3;cursor:pointer;color:var(--text)}
.result-name:hover{text-decoration:underline}
.result-actions{display:flex;gap:4px;flex-shrink:0}
.pos-badge{display:inline-flex;align-items:center;gap:5px;background:var(--code-bg);border-radius:4px;padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tag-text);margin-bottom:6px}
.tags-row{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--tag-bg);color:var(--tag-text);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:500}
.empty{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:12px}
.status-bar{font-size:12px;color:var(--text-muted);margin-bottom:12px;font-family:'IBM Plex Mono',monospace}

.form-section{margin-bottom:20px}
.form-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:5px;font-weight:500}
.form-input,.form-select{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--surface);color:var(--text);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--surface);transition:border-color .12s,background .12s;user-select:none}
.checkbox-item.checked{border-color:var(--text);background:var(--text);color:var(--accent-fg)}
.checkbox-item input{display:none}
.checkbox-label{font-size:13px;font-weight:500}
.form-actions{display:flex;gap:10px;margin-top:24px;padding-bottom:40px}
.form-actions .btn{flex:1;padding:13px;font-size:14px}

.dash-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:20px 0 10px;font-family:'IBM Plex Mono',monospace}
.dash-section-title:first-child{margin-top:0}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;text-align:center}
.stat-value{font-size:26px;font-weight:500;font-family:'IBM Plex Mono',monospace;line-height:1.1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.bar-label:hover{text-decoration:underline}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s ease}
.bar-count{font-size:12px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;min-width:24px;text-align:right}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:16px}
.cat-pill{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);font-size:13px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cat-pill:active{background:var(--tag-bg)}
.cat-pill-count{font-size:11px;font-family:'IBM Plex Mono',monospace;opacity:.6}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:14px;padding:4px 0}

/* IMPOSTAZIONI */
.settings-tabs{display:flex;gap:6px;margin-bottom:16px}
.settings-tab{padding:7px 14px;border:1px solid var(--border-strong);border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text-muted)}
.settings-tab.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.settings-panel{display:none}.settings-panel.active{display:block}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.tbl-row{display:grid;align-items:center;padding:10px 14px;border-bottom:0.5px solid var(--border);gap:8px}
.tbl-row:last-child{border-bottom:none}
.tbl-row.header{background:var(--tag-bg);font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.tbl-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.tbl-name{font-size:13px}
.tbl-sub{font-size:11px;color:var(--text-muted)}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.add-form-title{font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.add-form-grid.three{grid-template-columns:1fr 1fr 1fr}

/* DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,25,22,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.overlay-card{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px 20px 40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.overlay-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 20px}
.overlay-name{font-size:20px;font-weight:500;margin-bottom:16px;line-height:1.3}
.overlay-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.overlay-key{font-size:12px;color:var(--text-muted);font-weight:500;min-width:90px;padding-top:2px;flex-shrink:0}
.overlay-val{font-size:14px;color:var(--text);flex:1}
.overlay-pos-chain{display:flex;flex-wrap:wrap;align-items:center;gap:4px;font-size:13px}
.overlay-pos-chain .arrow{color:var(--text-muted)}
.overlay-pos-chain .node{background:var(--code-bg);padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.overlay-actions{display:flex;gap:8px;margin-top:20px}
.overlay-actions .btn{flex:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;transition:transform .25s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.checkbox-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}.add-form-grid{grid-template-columns:1fr}.add-form-grid.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">officina</div>
    <div class="header-sub" id="item-count">‚Äî</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('cerca')">Cerca</button>
    <button class="nav-btn" onclick="switchTab('sfoglia')">Sfoglia</button>
    <button class="nav-btn" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="switchTab('aggiungi')">Aggiungi</button>
    <button class="nav-btn" onclick="switchTab('impostazioni')">Impostazioni</button>
  </div>
  <div class="content">

    <!-- CERCA -->
    <div id="sec-cerca" class="section active">
      <div class="search-wrap">
        <input type="search" class="search-input" id="search-input" placeholder="nome, posizione, categoria..." oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn" onclick="doSearch()">Cerca</button>
      </div>
      <div id="search-status" class="status-bar"></div>
      <div id="results-list"><div class="empty"><div class="empty-icon">üîç</div>Scrivi qualcosa per cercare</div></div>
    </div>

    <!-- SFOGLIA -->
    <div id="sec-sfoglia" class="section">
      <div id="sfoglia-cats">
        <div class="status-bar" id="sfoglia-status"></div>
        <div class="cat-grid" id="cat-pills"></div>
      </div>
      <div id="sfoglia-results" style="display:none">
        <div class="back-btn" onclick="showCatList()">‚Üê tutte le categorie</div>
        <div class="status-bar" id="sfoglia-result-status"></div>
        <div id="sfoglia-items-list"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section">
      <div id="dashboard-content"><div class="empty">Caricamento...</div></div>
    </div>

    <!-- AGGIUNGI -->
    <div id="sec-aggiungi" class="section">
      <div id="edit-banner" style="display:none;background:#FAEEDA;border:1px solid #FAC775;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#633806;justify-content:space-between;align-items:center;">
        <span>Modalit√Ý modifica</span>
        <button class="btn btn-sm" onclick="resetForm()">Annulla</button>
      </div>
      <div class="form-section">
        <div class="form-section-title">Oggetto</div>
        <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="f-nome" placeholder="es. Chiave inglese 32mm" autocomplete="off"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Quantit√Ý</label><input class="form-input" id="f-qty" type="number" min="0" value="1"></div>
          <div class="form-group"><label class="form-label">Unit√Ý</label>
            <select class="form-select" id="f-unita">
              <option value="pz">pz</option><option value="m">m</option><option value="cm">cm</option>
              <option value="kg">kg</option><option value="g">g</option><option value="l">l</option>
              <option value="ml">ml</option><option value="fogli">fogli</option><option value="rotoli">rotoli</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Dimensioni (facoltativo)</label><input class="form-input" id="f-dim" placeholder="es. 32mm, 1m x 2m, M8"></div>
        <div class="form-group"><label class="form-label">Note (facoltativo)</label><input class="form-input" id="f-note" placeholder="marca, modello, stato..."></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">Posizione</div>
        <div class="form-group">
          <label class="form-label">Dove si trova questo oggetto?</label>
          <select class="form-select" id="f-pos"><option value="">‚Äî seleziona ‚Äî</option></select>
          <div id="f-pos-hint" style="font-size:12px;color:var(--text-muted);margin-top:6px"></div>
        </div>
      </div>
      <div class="form-section">
        <div class="form-section-title">Categorie</div>
        <div class="checkbox-grid" id="cat-grid"></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="resetForm()">Pulisci</button>
        <button class="btn btn-primary" onclick="saveItem()">Salva</button>
      </div>
    </div>

    <!-- IMPOSTAZIONI -->
    <div id="sec-impostazioni" class="section">
      <div class="settings-tabs">
        <button class="settings-tab active" onclick="switchSettingsTab('elementi')">Elementi fissi</button>
        <button class="settings-tab" onclick="switchSettingsTab('contenitori')">Contenitori</button>
        <button class="settings-tab" onclick="switchSettingsTab('mappa')">Mappa</button>
      </div>
      <div id="sp-elementi" class="settings-panel active"></div>
      <div id="sp-contenitori" class="settings-panel"></div>
      <div id="sp-mappa" class="settings-panel"></div>
    </div>

  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="overlay-card">
    <div class="overlay-handle"></div>
    <div class="overlay-name" id="d-nome"></div>
    <div id="d-rows"></div>
    <div class="overlay-actions">
      <button class="btn" onclick="closeDetailDirect()">Chiudi</button>
      <button class="btn" id="d-edit-btn">‚úèÔ∏è Modifica</button>
      <button class="btn btn-danger" id="d-del-btn">Elimina</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxbo-mBXrzLPzvwq66Kyixu9TAVl-TALke6g6roIAxJZbGhd3VulqZHryzdfclguFsc/exec';

const PARETI={LP:'Parete Lato Pisa',LM:'Parete Lato Mare',LL:'Parete Lato Lago',LV:'Parete Lato Viareggio'};

const CATEGORIE=['Viteria','Bulloneria','Restauro','Saldatura','Elettricit√Ý','Elettronica','Ferro','Idraulica','Laboratorio','Motori','Verniciatura','Woodworking','Attrezzi','Wrangler','Progetti da fare','Aria compressa','Varie','Carpenteria','Muratura'];

let cachedItems=[], cachedElem=[], cachedCont=[];
let selectedCats=new Set(), editId=null, currentDetailId=null;

// ---- INIT ----
function init(){
  buildCatGrid();
  loadLocalCache();
  refreshFromServer();
}

function loadLocalCache(){
  try{
    const i=localStorage.getItem('off_items'); if(i)cachedItems=JSON.parse(i);
    const e=localStorage.getItem('off_elem');  if(e)cachedElem=JSON.parse(e);
    const c=localStorage.getItem('off_cont');  if(c)cachedCont=JSON.parse(c);
  }catch(e){}
  updateItemCount();
  buildPosSelect();
}

function saveLocalCache(){
  localStorage.setItem('off_items',JSON.stringify(cachedItems));
  localStorage.setItem('off_elem', JSON.stringify(cachedElem));
  localStorage.setItem('off_cont', JSON.stringify(cachedCont));
  updateItemCount();
  buildPosSelect();
}

async function refreshFromServer(){
  try{
    const r=await fetch(SCRIPT_URL);
    const d=await r.json();
    if(d.items)      cachedItems=d.items;
    if(d.elementi)   cachedElem=d.elementi;
    if(d.contenitori)cachedCont=d.contenitori;
    saveLocalCache();
  }catch(e){}
}

function updateItemCount(){
  document.getElementById('item-count').textContent=cachedItems.length?cachedItems.length+' oggetti':'‚Äî';
}

// ---- POSIZIONE: menu unico con gruppi ----
function buildPosSelect(){
  const sel=document.getElementById('f-pos');
  if(!sel)return;
  const cur=sel.value;

  // costruisce le posizioni dirette espandendo i rack e gli armadi
  const directOpts=[];
  cachedElem.forEach(el=>{
    const tipo=(el.tipo||'').toLowerCase();
    if(tipo==='rack'){
      for(let r=1;r<=4;r++) directOpts.push({code:el.codice+'.'+r, label:el.codice+'.'+r+' ‚Äî '+el.nome+' Ripiano '+r, group:'Rack'});
    } else if(tipo==='armadio'){
      ['C1','C2','C3','C4'].forEach((c,i)=>directOpts.push({code:el.codice+'.'+c,label:el.codice+'.'+c+' ‚Äî '+el.nome+' Cassetto '+(i+1),group:'Armadi'}));
      directOpts.push({code:el.codice+'.SA',label:el.codice+'.SA ‚Äî '+el.nome+' Sportello alto',group:'Armadi'});
      directOpts.push({code:el.codice+'.SB',label:el.codice+'.SB ‚Äî '+el.nome+' Sportello basso',group:'Armadi'});
    } else {
      const g=tipo==='bancone'?'Banchi':tipo==='pannello'||tipo==='mensola'?'Pannelli & Mensole':tipo==='porta'?'Porte':'Altro';
      directOpts.push({code:el.codice,label:el.codice+' ‚Äî '+el.nome,group:g});
    }
  });

  // raggruppa
  const groups={};
  directOpts.forEach(o=>{if(!groups[o.group])groups[o.group]=[];groups[o.group].push(o);});

  let html='<option value="">‚Äî seleziona ‚Äî</option>';

  // contenitori mobili per primi
  if(cachedCont.length){
    html+='<optgroup label="Contenitori mobili">';
    cachedCont.forEach(c=>html+='<option value="CONT:'+c.codice+'">'+c.codice+' ‚Äî '+c.nome+'</option>');
    html+='</optgroup>';
  }

  // poi posizioni dirette per gruppo
  Object.entries(groups).forEach(([g,opts])=>{
    html+='<optgroup label="'+g+'">';
    opts.forEach(o=>html+='<option value="'+o.code+'">'+o.label+'</option>');
    html+='</optgroup>';
  });

  sel.innerHTML=html;
  if(cur)sel.value=cur;
  sel.onchange=updatePosHint;
}

function updatePosHint(){
  const val=document.getElementById('f-pos').value;
  const hint=document.getElementById('f-pos-hint');
  if(!val||!val.startsWith('CONT:')){hint.textContent='';return;}
  const code=val.replace('CONT:','');
  const cont=cachedCont.find(c=>c.codice===code);
  if(!cont){hint.textContent='';return;}
  // risolvi posizione del contenitore
  const chain=resolveChain(cont.posizione);
  hint.textContent='Si trova in: '+chain;
}

function resolveChain(posCode){
  if(!posCode)return '‚Äî';
  // potrebbe puntare a un altro contenitore
  const cont=cachedCont.find(c=>c.codice===posCode);
  if(cont)return cont.codice+' ('+cont.nome+') ‚Üí '+resolveChain(cont.posizione);
  // cerca tra elementi
  const elem=cachedElem.find(e=>e.codice===posCode||posCode.startsWith(e.codice+'.'));
  if(elem){
    const parete=PARETI[elem.parete]||elem.parete||'';
    return posCode+(parete?' ‚Äî '+parete:'');
  }
  return posCode;
}

// ---- TABS ----
function switchTab(t){
  const tabs=['cerca','sfoglia','dashboard','aggiungi','impostazioni'];
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='dashboard')renderDashboard();
  if(t==='sfoglia')renderCatPills();
  if(t==='impostazioni')renderSettings('elementi');
}

// ---- CERCA ----
function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const list=document.getElementById('results-list');
  const status=document.getElementById('search-status');
  if(!q){list.innerHTML='<div class="empty"><div class="empty-icon">üîç</div>Scrivi qualcosa per cercare</div>';status.textContent='';return;}
  const res=cachedItems.filter(i=>
    (i.nome||'').toLowerCase().includes(q)||
    (i.categorie||'').toLowerCase().includes(q)||
    (i.posizione||'').toLowerCase().includes(q)||
    (i.note||'').toLowerCase().includes(q)||
    (i.dimensioni||'').toLowerCase().includes(q)
  );

function renderCatPills(){

// ---- DASHBOARD ----
function renderDashboard(){
  const el=document.getElementById('dashboard-content');
  if(!cachedItems.length){el.innerHTML='<div class="empty">Nessun dato ancora inserito</div>';return;}
  const total=cachedItems.length;
  const catCount={},posCount={};
  cachedItems.forEach(item=>{
    if(item.categorie)item.categorie.split(',').forEach(c=>{const t=c.trim();if(t)catCount[t]=(catCount[t]||0)+1;});
    const p=item.posizione||'‚Äî';posCount[p]=(posCount[p]||0)+1;
  });
  const topCats=Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topPos=Object.entries(posCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCat=topCats[0]?.[1]||1,maxPos=topPos[0]?.[1]||1;
  el.innerHTML=
    '<div class="dash-section-title">Totale</div>'+
    '<div class="stat-grid"><div class="stat-card" style="grid-column:1/-1;text-align:left;display:flex;align-items:baseline;gap:12px"><div class="stat-value">'+total+'</div><div class="stat-label">oggetti in inventario</div></div></div>'+
    '<div class="dash-section-title">Per categoria</div>'+
    topCats.map(([c,n])=>'<div class="bar-row"><div class="bar-label" onclick="goToCat(\''+c+'\')">'+c+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxCat*100)+'%"></div></div><div class="bar-count">'+n+'</div></div>').join('')+
    '<div class="dash-section-title">Per posizione</div>'+
    topPos.map(([p,n])=>'<div class="bar-row"><div class="bar-label" onclick="searchPos(\''+p+'\')">'+p+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(n/maxPos*100)+'%"></div></div><div class="bar-count">'+n+'</div></div>').join('')+
    '<div style="padding-bottom:40px"></div>';
}

// ---- ITEM CARD ----
function itemCard(item){
  const cats=item.categorie?item.categorie.split(',').map(c=>'<span class="tag">'+c.trim()+'</span>').join(''):'';
  const qty=item.qty?item.qty+' '+(item.unita||'pz'):'';
  const dim=item.dimensioni?' ¬∑ '+item.dimensioni:'';
  const posDisplay=buildPosDisplay(item.posizione);
  return '<div class="result-card">'+
    '<div class="result-top"><div class="result-name" onclick="openDetail(\''+item.id+'\')">'+item.nome+'</div>'+
    '<div class="result-actions"><button class="btn btn-sm btn-ghost" onclick="editItem(\''+item.id+'\')" title="Modifica">‚úèÔ∏è</button>'+
    '<button class="btn btn-sm btn-danger" onclick="deleteItem(\''+item.id+'\')" title="Elimina">‚úï</button></div></div>'+
    (posDisplay?'<div style="margin-bottom:6px">'+posDisplay+'</div>':'')+
    (qty?'<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">'+qty+dim+'</div>':'')+
    (cats?'<div class="tags-row">'+cats+'</div>':'')+
    (item.note?'<div style="font-size:12px;color:var(--text-muted);margin-top:6px">'+item.note+'</div>':'')+
    '</div>';
}

function buildPosDisplay(posCode){
  if(!posCode)return '';
  // controlla se √® un contenitore
  const isContRef=posCode.startsWith('CONT:');
  const code=isContRef?posCode.replace('CONT:',''):posCode;
  const cont=cachedCont.find(c=>c.codice===code);
  if(cont){
    return '<span class="pos-badge">'+code+' ‚Äî '+cont.nome+'</span>';
  }
  return '<span class="pos-badge">'+code+'</span>';
}

// ---- DETAIL OVERLAY ----
function openDetail(id){
  const item=cachedItems.find(i=>i.id===id);if(!item)return;
  currentDetailId=id;
  document.getElementById('d-nome').textContent=item.nome;
  const rows=[];

  // posizione con catena
  if(item.posizione){
    const code=item.posizione.replace('CONT:','');
    const cont=cachedCont.find(c=>c.codice===code);
    let posHtml='';
    if(cont){
      posHtml='<div class="overlay-pos-chain"><span class="node">'+code+'</span><span style="font-size:12px;color:var(--text-muted)"> '+cont.nome+'</span>';
      if(cont.posizione){
        posHtml+=' <span class="arrow">‚Üí</span> <span class="node">'+cont.posizione+'</span>';
        const elem=cachedElem.find(e=>e.codice===cont.posizione||cont.posizione.startsWith(e.codice+'.'));
        if(elem&&elem.parete){posHtml+=' <span class="arrow">‚Üí</span> <span class="node">'+elem.parete+'</span><span style="font-size:11px;color:var(--text-muted)"> '+(PARETI[elem.parete]||'')+'</span>';}
      }
      posHtml+='</div>';
    } else {
      const elem=cachedElem.find(e=>e.codice===code||code.startsWith(e.codice+'.'));
      posHtml='<div class="overlay-pos-chain"><span class="node">'+code+'</span>';
      if(elem){
        posHtml+=' <span style="font-size:12px;color:var(--text-muted)">'+elem.nome+'</span>';
        if(elem.parete) posHtml+=' <span class="arrow">‚Üí</span> <span class="node">'+elem.parete+'</span><span style="font-size:11px;color:var(--text-muted)"> '+(PARETI[elem.parete]||'')+'</span>';
      }
      posHtml+='</div>';
    }
    rows.push(['Posizione',posHtml]);
  }

  if(item.qty)rows.push(['Quantit√Ý',item.qty+' '+(item.unita||'pz')]);
  if(item.dimensioni)rows.push(['Dimensioni',item.dimensioni]);
  if(item.categorie)rows.push(['Categorie','<div class="tags-row" style="margin-top:2px">'+item.categorie.split(',').map(c=>'<span class="tag">'+c.trim()+'</span>').join('')+'</div>']);
  if(item.note)rows.push(['Note',item.note]);
  if(item.data)rows.push(['Inserito',item.data]);

  document.getElementById('d-rows').innerHTML=rows.map(([k,v])=>'<div class="overlay-row"><div class="overlay-key">'+k+'</div><div class="overlay-val">'+v+'</div></div>').join('');
  document.getElementById('d-edit-btn').onclick=()=>{closeDetailDirect();editItem(id);};
  document.getElementById('d-del-btn').onclick=()=>{closeDetailDirect();deleteItem(id);};
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailDirect();}
function closeDetailDirect(){document.getElementById('detail-overlay').classList.remove('open');}

async function saveItem(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Inserisci il nome');return;}
  const posVal=document.getElementById('f-pos').value;
  const item={
    id:editId||Date.now().toString(),
    nome,
    qty:document.getElementById('f-qty').value||'1',
    unita:document.getElementById('f-unita').value,
    dimensioni:document.getElementById('f-dim').value.trim(),
    posizione:posVal,
    categorie:[...selectedCats].join(', '),
    note:document.getElementById('f-note').value.trim(),
    data:new Date().toLocaleDateString('it-IT'),
    action:editId?'update':'add',
    sheet:'Foglio1'
  };
  toast('Salvataggio...');
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(item)});}catch(e){}
  const idx=cachedItems.findIndex(i=>i.id===item.id);
  if(idx>=0)cachedItems[idx]=item;else cachedItems.push(item);
  saveLocalCache();toast(editId?'Modificato!':'Salvato!');resetForm();
}

async function deleteItem(id){
  if(!confirm('Eliminare questo elemento?'))return;
  cachedItems=cachedItems.filter(i=>i.id!==id);

  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id,sheet:'Foglio1'})});}catch(e){}
}

function editItem(id){
  const item=cachedItems.find(i=>i.id===id);if(!item)return;

  document.getElementById('f-qty').value=item.qty||1;

  selectedCats=new Set(item.categorie?item.categorie.split(',').map(c=>c.trim()).filter(Boolean):[]);

function resetForm(){

function buildPosOptsHTML(){
  let html='<option value="">‚Äî seleziona ‚Äî</option>';
  const rack=cachedElem.filter(e=>(e.tipo||'')===('rack'));
  if(rack.length){
    html+='<optgroup label="Ripiani rack">';
    rack.forEach(r=>{for(let i=1;i<=4;i++)html+='<option value="'+r.codice+'.'+i+'">'+r.codice+'.'+i+' ‚Äî '+r.nome+' Ripiano '+i+'</option>';});
    html+='</optgroup>';
  }
  const arm=cachedElem.filter(e=>(e.tipo||'')==='armadio');
  if(arm.length){
    html+='<optgroup label="Armadi">';
    arm.forEach(a=>{
      ['C1','C2','C3','C4'].forEach((c,i)=>html+='<option value="'+a.codice+'.'+c+'">'+a.codice+'.'+c+' ‚Äî '+a.nome+' Cassetto '+(i+1)+'</option>');
      html+='<option value="'+a.codice+'.SA">'+a.codice+'.SA ‚Äî '+a.nome+' Sportello alto</option>';
      html+='<option value="'+a.codice+'.SB">'+a.codice+'.SB ‚Äî '+a.nome+' Sportello basso</option>';
    });
    html+='</optgroup>';
  }
  const altri=cachedElem.filter(e=>e.tipo!=='rack'&&e.tipo!=='armadio');
  if(altri.length){
    html+='<optgroup label="Altri elementi">';
    altri.forEach(e=>html+='<option value="'+e.codice+'">'+e.codice+' ‚Äî '+e.nome+'</option>');
    html+='</optgroup>';
  }
  return html;
}

    btn.textContent='Aggiorna';
    btn.onclick=async()=>{
      Object.assign(c,{nome:document.getElementById('nc-nome').value.trim(),posizione:document.getElementById('nc-pos').value,note:document.getElementById('nc-note').value.trim()});
      saveLocalCache();
      fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({...c,action:'update',sheet:'Foglio3'})}).catch(()=>{});
      renderSettings('contenitori');buildPosSelect();toast('Contenitore aggiornato');
    };
  },50);
}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400);}

init();
</script>
</body>
